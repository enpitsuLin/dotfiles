- defaults:
    link:
      create: true
      relink: true

- clean: ['~']

- link:
    ~/.dotfiles:
      force: true
      path: ''
    ~/.zshrc: 
      path: .zshrc
    ~/.starship:
      path: .starship
    ~/.config/mise:
      path: mise

- shell:
  - [command -v mise >/dev/null 2>&1 && mise install, Install configured mise toolchains]
